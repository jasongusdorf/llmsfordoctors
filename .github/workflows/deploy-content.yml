name: Deploy on Content Change

on:
  push:
    branches: [main]
    paths:
      - 'src/content/**'
  # Safety valve: GitHub occasionally skips run creation for rapid
  # successive pushes; the editor's deploy-status endpoint dispatches
  # a run manually when that happens.
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Patch worker config (cron + KV bindings)
        run: node scripts/post-build.mjs
      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --config dist/server/wrangler.json
