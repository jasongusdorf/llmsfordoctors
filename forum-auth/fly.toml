app = "llmsfordoctors-auth"
primary_region = "iad"

[build]

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[mounts]
  source = "auth_data"
  destination = "/data"

[env]
  PORT = "3000"
  DATABASE_PATH = "/data/auth.db"
